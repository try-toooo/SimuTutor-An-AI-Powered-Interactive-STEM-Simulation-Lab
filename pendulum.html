<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pendulum Lab | SimuTutor</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="index.html">
      <span class="brand-mark">S</span>
      <span>SimuTutor</span>
    </a>
    <nav class="nav-links" aria-label="Primary navigation">
      <a href="labs.html">Labs</a>
      <a href="projectile.html">Projectile</a>
      <a class="active" href="pendulum.html">Pendulum</a>
      <a href="electric-field.html">Electric Field</a>
    </nav>
  </header>

  <main class="lab-shell">
    <section class="lab-header">
      <div>
        <p class="eyebrow">Concept Lab</p>
        <h1>Pendulum Lab</h1>
        <p>Learning goal: explore how pendulum length and gravity affect the period of motion.</p>
      </div>
      <a class="btn secondary" href="labs.html">All Labs</a>
    </section>

    <section class="workspace">
      <div class="canvas-panel">
        <canvas id="pendulumCanvas" width="900" height="520" aria-label="Pendulum simulation"></canvas>
      </div>

      <aside class="control-panel" aria-label="Pendulum controls">
        <div class="panel-section">
          <h2>Controls</h2>
          <label class="range-row">
            <span>Length <strong id="lengthValue">2.0</strong> m</span>
            <input id="length" type="range" min="0.7" max="4" step="0.1" value="2">
          </label>
          <label class="range-row">
            <span>Initial Angle <strong id="startAngleValue">24</strong> deg</span>
            <input id="startAngle" type="range" min="5" max="50" value="24">
          </label>
          <label class="range-row">
            <span>Gravity <strong id="pendulumGravityValue">9.8</strong> m/s^2</span>
            <input id="pendulumGravity" type="range" min="3" max="16" step="0.1" value="9.8">
          </label>
          <div class="button-row">
            <button class="btn primary" id="restartPendulum">Restart</button>
          </div>
        </div>

        <div class="panel-section ai-panel">
          <h2>AI Tutor</h2>
          <div id="pendulumFeedback" class="feedback">Change the pendulum parameters and ask for an explanation.</div>
          <div class="button-row vertical">
            <button class="btn tutor" id="pendulumHint">Ask for Hint</button>
            <button class="btn tutor" id="pendulumExplain">Explain Result</button>
            <button class="btn tutor" id="pendulumQuiz">Generate Quiz</button>
          </div>
        </div>

        <div class="panel-section progress-panel">
          <h2>Measured Period</h2>
          <p class="big-stat"><span id="periodValue">2.84</span>s</p>
        </div>
      </aside>
    </section>
  </main>

  <script src="js/storage.js"></script>
  <script src="js/aiTutor.js"></script>
  <script src="js/pendulum.js"></script>
</body>
</html>
